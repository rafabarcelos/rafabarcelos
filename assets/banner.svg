<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 400" width="1280" height="400" role="img" aria-labelledby="title desc">
  <title id="title">Rafael Cuesta Barcelos — Information Security Specialist</title>
  <desc id="desc">BISO, Cloud Security, Application Security, AI Security — InfocuestaSec</desc>
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05070c"/>
      <stop offset="55%" stop-color="#0a0c12"/>
      <stop offset="100%" stop-color="#0e1119"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a2c4a"/>
      <stop offset="100%" stop-color="#2c4670"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3ec1f0"/>
      <stop offset="100%" stop-color="#1a2c4a"/>
    </linearGradient>
    <linearGradient id="dividerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3ec1f0" stop-opacity="0.55"/>
      <stop offset="45%" stop-color="#3ec1f0" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#3ec1f0" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3ec1f0" stop-opacity="0.24"/>
      <stop offset="70%" stop-color="#3ec1f0" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#ecf0f7" fill-opacity="0.07"/>
    </pattern>
  </defs>

  <rect x="0" y="0" width="1280" height="400" fill="url(#bgGrad)"/>
  <rect x="0" y="0" width="1280" height="270" fill="url(#dots)"/>
  <circle cx="0" cy="0" r="260" fill="url(#glowGrad)"/>

  <g opacity="0.05" transform="translate(940,-40)">
    <path d="M160 60 80 90v70c0 50 35 85 80 100 45-15 80-50 80-100V90z" fill="none" stroke="#7ed7f5" stroke-width="10" stroke-linejoin="round" stroke-linecap="round"/>
    <path d="M120 160 150 190 220 130" fill="none" stroke="#3ec1f0" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <rect x="0" y="0" width="5" height="400" fill="url(#barGrad)"/>
  <rect x="0.5" y="0.5" width="1279" height="399" fill="none" stroke="#7ed7f5" stroke-opacity="0.18" stroke-width="1"/>

  <g transform="translate(68,118)">
    <rect x="0" y="0" width="96" height="96" rx="21" fill="url(#shieldGrad)" stroke="#7ed7f5" stroke-opacity="0.25"/>
    <path d="M48 22 26 30v18c0 14 10 24 22 28 12-4 22-14 22-28V30z" fill="none" stroke="#ffffff" stroke-width="4" stroke-linejoin="round" stroke-linecap="round"/>
    <path d="M36 50 44 58 62 40" fill="none" stroke="#3ec1f0" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <text x="192" y="164" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-weight="800" font-size="46" letter-spacing="-0.3" fill="#f3f6fb">Rafael Cuesta Barcelos</text>
  <text x="192" y="199" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-weight="500" font-size="21" fill="#aab2c2">Information Security Specialist</text>

  <line x1="68" y1="240" x2="1212" y2="240" stroke="url(#dividerGrad)" stroke-width="1"/>

  <text x="68" y="275" font-family="'Courier New',ui-monospace,monospace" font-weight="600" font-size="14" letter-spacing="1.2" xml:space="preserve"><tspan fill="#3ec1f0">BISO</tspan><tspan fill="#7ed7f5" fill-opacity="0.6">   •   </tspan><tspan fill="#c8d1d9">CLOUD SECURITY</tspan><tspan fill="#7ed7f5" fill-opacity="0.6">   •   </tspan><tspan fill="#c8d1d9">APPLICATION SECURITY</tspan><tspan fill="#7ed7f5" fill-opacity="0.6">   •   </tspan><tspan fill="#c8d1d9">AI SECURITY</tspan></text>

  <text x="1212" y="371" text-anchor="end" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="15" font-weight="700" fill="#dfe4ec">Infocuesta<tspan fill="#3ec1f0" font-weight="500">Sec</tspan></text>
</svg>
